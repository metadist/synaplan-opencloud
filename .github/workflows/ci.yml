name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: metadist/synaplan-opencloud
  # Pinned synaplan dependency — update both together when bumping.
  SYNAPLAN_REF: fffae255a6dc7974a2e4612bebf6e018da57bcf8
  SYNAPLAN_IMAGE_DIGEST: sha256:71d343f439d0de8aa46dba95946a4b7948175d27b73599ebcfc6a6a8e4e1a66d

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm check:types
      - run: pnpm test:unit --watch=false
      - run: pnpm build

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - run: go test ./...

      - uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          working-directory: backend

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download frontend dist
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=pr

      - name: Build Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/docker-image.tar

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docker-image
          path: /tmp/docker-image.tar
          retention-days: 1

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Add host.docker.internal to /etc/hosts
        run: echo "127.0.0.1 host.docker.internal" | sudo tee -a /etc/hosts

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Download frontend dist
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-playwright-chromium-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: frontend
        run: pnpm exec playwright install-deps chromium

      # --- Start Synaplan test stack ---
      - name: Clone synaplan
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: metadist/synaplan
          # Pin checkout and image together. Update both when bumping synaplan.
          ref: ${{ env.SYNAPLAN_REF }}
          path: synaplan

      - name: Start Synaplan test stack
        working-directory: synaplan
        env:
          APP_IMAGE: ghcr.io/metadist/synaplan@${{ env.SYNAPLAN_IMAGE_DIGEST }}
        run: |
          docker pull $APP_IMAGE
          COMPOSE="docker compose -f docker-compose.test.yml -f docker-compose.test.ci.yml --profile oidc"
          $COMPOSE up -d --wait
          echo "Waiting for Keycloak setup..."
          docker wait synaplan-keycloak-setup-test
          echo "Synaplan test stack ready"

      # --- Start synaplan-opencloud stack ---
      - name: Download backend Docker image
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: docker-image
          path: /tmp

      - name: Load backend Docker image
        run: |
          docker load -i /tmp/docker-image.tar
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest synaplan-opencloud:ci 2>/dev/null || \
            docker tag $(docker images --format '{{.Repository}}:{{.Tag}}' | grep synaplan-opencloud | head -1) synaplan-opencloud:ci

      - name: Start synaplan-opencloud
        env:
          BACKEND_IMAGE: synaplan-opencloud:ci
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d
          echo "Waiting for OpenCloud..."
          for i in $(seq 1 30); do
            if curl -ks https://host.docker.internal:9200/status.php | grep -q installed; then
              echo "OpenCloud is ready"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 5
          done
          echo "OpenCloud did not become ready"
          docker logs synaplan-opencloud-opencloud-1 2>&1 | tail -20
          exit 1

      # --- Run E2E tests ---
      - name: Verify services
        run: |
          echo "=== Synaplan backend ==="
          curl -s http://host.docker.internal:8001/api/health | head -1 || echo "FAILED"
          echo "=== Keycloak ==="
          curl -sk https://host.docker.internal:8444/realms/synaplan | head -1 || echo "FAILED"
          echo "=== OpenCloud ==="
          curl -sk https://host.docker.internal:9200/status.php | head -1 || echo "FAILED"
          echo "=== Backend ==="
          curl -s http://host.docker.internal:9106/api/synaplan/me | head -1 || echo "FAILED"
          echo "=== Docker ps ==="
          docker ps --format '{{.Names}} {{.Status}}'

      - name: Run E2E tests
        working-directory: frontend
        env:
          BASE_URL_OC: https://host.docker.internal:9200
          KEYCLOAK_HTTPS_URL: https://host.docker.internal:8444
        run: pnpm test:e2e

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Teardown
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
          cd synaplan && docker compose -f docker-compose.test.yml -f docker-compose.test.ci.yml --profile oidc down -v

  docker-push:
    name: Docker Push
    runs-on: ubuntu-latest
    needs: [e2e]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download Docker image
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/docker-image.tar

      - name: Log in to registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        run: docker image push --all-tags ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [frontend, backend, docker-build, e2e, docker-push]
    if: always()
    steps:
      - name: Check for failures
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "One or more checks failed, were cancelled, or were skipped"
          exit 1

      - name: All checks passed
        if: "!(contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled'))"
        run: echo "All checks passed"
